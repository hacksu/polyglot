{% extends "base.html" %}
{% block slides %}
  {% for slide in slides %}
  <div class="slide{% if loop.first %} active{% endif %}" id="{{ slide.id }}">
    <div class="slide-header">
      <span class="tag">{{ slide.tag }}{% if slide.title %} - {{ slide.title }}{% endif %}</span>
      {% if show_logo %}
      <img src="/logo" alt="HacKSU" style="height:22px; vertical-align:middle; opacity:0.92;">
      {% endif %}
    </div>
    <div class="slide-body markdown-slide">{{ slide.html | safe }}</div>
  </div>
  {% endfor %}
{% endblock %}
